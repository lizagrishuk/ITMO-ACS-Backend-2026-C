name: Deploy to Yandex Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Copy files to server
        run: |
          ssh ubuntu@${{ secrets.SERVER_IP }} "mkdir -p ~/restaurant-microservices"
          scp docker-compose.yml ubuntu@${{ secrets.SERVER_IP }}:~/
          scp -r БР2.1/Грищук\ Елизавета/labs/lab2/restaurant-microservices/auth-service ubuntu@${{ secrets.SERVER_IP }}:~/
          scp -r БР2.1/Грищук\ Елизавета/labs/lab2/restaurant-microservices/restaurant-service ubuntu@${{ secrets.SERVER_IP }}:~/
          scp -r БР2.1/Грищук\ Елизавета/labs/lab2/restaurant-microservices/booking-service ubuntu@${{ secrets.SERVER_IP }}:~/
          scp -r БР2.1/Грищук\ Елизавета/labs/lab2/restaurant-microservices/review-service ubuntu@${{ secrets.SERVER_IP }}:~/
          scp -r БР2.1/Грищук\ Елизавета/labs/lab2/restaurant-microservices/api-gateway ubuntu@${{ secrets.SERVER_IP }}:~/

      - name: Deploy on server
        run: |
          ssh ubuntu@${{ secrets.SERVER_IP }} "cd ~ && docker compose down && docker compose up --build -d"